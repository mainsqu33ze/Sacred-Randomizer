# FE8 Randomizer Configuration
# =============================
#
# Set to true to enable each feature. See comments below each option.
# First-time users: the defaults below give a fun, balanced randomizer experience.
# For advanced options, tweak the numbers under each feature.
#
# Override the seed on the command line:
#   python fe8_randomizer.py ROM.GBA -c config.yaml --seed 12345

seed: 42  # 0 = random (uses system time); also overridable via --seed

# ---------------------------------------------------------------------------
# CLASSES
# ---------------------------------------------------------------------------
# Shuffles which class each playable character belongs to.
# Characters keep their original stats unless stat randomization is also enabled.
class_randomization:
  mode: random              # 'shuffle' (permute, no repeats) or 'random' (sample with replacement, repeats allowed)
  manakete_count: 1          # max characters that become Manakete (0 = none)
  omit_classes: []           # List of JID enum names to exclude, e.g. [NECROMANCER] (case-insensitive)

# ---------------------------------------------------------------------------
# GROWTH RATES
# ---------------------------------------------------------------------------
# Controls how fast characters gain stats per level-up.
# Modes: false (keep vanilla), 'shuffle' (reorder existing), 'random' (new values), 'pool' (distribute total)
growth_randomization:
  character: random            # Per-character growth rates
  class: random               # Per-class growth rates (applied on top of character growths)
  min: 0                     # Minimum growth rate (for 'random' / 'pool' modes)
  max: 100                   # Maximum growth rate (for 'random' / 'pool' modes)
  mean: null                 # Mean for 'random' normal distribution (null = use original value)
  stddev: 10                 # Standard deviation for 'random' normal distribution
  pool_total: 315            # Total growth pool for 'pool' mode (null = preserve each character's original total)

# ---------------------------------------------------------------------------
# BASE STATS
# ---------------------------------------------------------------------------
# Randomizes starting stats for characters or classes.
# Modes: false (keep vanilla), 'shuffle' (swap values), 'random' (new values), or a multiplier (e.g. 1.5)
base_stat_randomization:
  character: random          # Per-character base stats (HP, Str, Skl, Spd, Def, Res, Luck)
  class: shuffle             # Per-class base stats (HP, Pow, Skl, Spd, Def, Res, Con, Mov)
  preserve_base: true        # when class=shuffle: true = swap existing values; false = assign random(0,20)
  shuffle_con_mov: false      # when class=shuffle: true = include in the class shuffling; false = leave Con and Mov unchanged
  cross_tier_scramble: false # when class=shuffle: allow swapping across promoted/unpromoted/trainee tiers
  mean: null                 # Mean for 'random' mode (null = use original stat value)
  stddev: 3                  # Standard deviation for 'random' mode

# ---------------------------------------------------------------------------
# ITEMS (Weapons + Inventory)
# ---------------------------------------------------------------------------
# When classes get shuffled, characters need weapons they can actually use.
# This is ON by default and strongly recommended if class_randomization.shuffle is true.
item_randomization:
  enabled: true              # true = give characters weapons usable by their new class
  mode: random               # 'random' = pick random usable weapons from pools; 'shuffle' = permute all items
  randomize_events: false    # true = also randomize items given via GiveItem event commands (slow)

# ---------------------------------------------------------------------------
# WEAPON STATS (Might / Hit / Weight / Crit)
# ---------------------------------------------------------------------------
# Randomizes the numeric stats of all weapons independently.
weapon_randomization:
  enabled: true             # false = keep weapon stats as-is; true = randomize all 4 stats
  might: true                # Per-stat toggle: true = randomize, false = keep original, number = multiplier
  hit: true
  weight: true
  crit: true
  mean: null                 # Mean for random values (null = use original value)
  stddev: 5                  # Global standard deviation
  might_stddev: 3            # Per-stat standard deviation overrides
  hit_stddev: 20
  weight_stddev: 3
  crit_stddev: 5
  min_might: 1               # Clamp ranges for each stat
  max_might: 20
  min_hit: 30
  max_hit: 120
  min_weight: 1
  max_weight: 20
  min_crit: 0
  max_crit: 30

# ---------------------------------------------------------------------------
# WEAPON EFFECTS (Poison / Nosferatu / Eclipse / Devil / Stone)
# ---------------------------------------------------------------------------
# Randomly adds special effects to some weapons.
weapon_effects:
  enabled: 10             # false = off; number = percent chance per weapon (e.g. 10 = 10%)
  poison: 2                  # Relative weight for each effect (higher = more likely when rolling)
  nosferatu: 3
  eclipse: 1
  devil: 5
  stone: 1

# ---------------------------------------------------------------------------
# AFFINITIES
# ---------------------------------------------------------------------------
# Randomizes each character's support affinity (Fire, Thunder, Wind, etc.).
affinity_randomization:
  enabled: true             # true = randomize; keeps valid affinity range (1-7)

# ---------------------------------------------------------------------------
# PROMOTION ITEMS (Master Seals, Heaven Seals, etc.)
# ---------------------------------------------------------------------------
# Makes ALL promotion items behave like Master Seals:
#   - Any unpromoted class can use them on any character
#   - Chests, enemy drops, and events only give Master Seals
# This is ON by default and makes promotion simpler and more flexible.
promotion_items:
  enabled: true                          # true = unify all promotion items as Master Seals
  master_seal_universal: true            # false = restore vanilla per-class promotion restrictions
  replace_distribution: true             # false = keep original promotion item types in chests/drops/events
