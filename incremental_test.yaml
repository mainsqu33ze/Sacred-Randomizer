# Minimal config that enables all features with default settings.
# Use this to verify every feature runs without errors:
#   python fe8_randomizer.py ROM.GBA -c incremental_test.yaml -o test.gba

seed: 42

class_randomization:
  mode: shuffle
  manakete_count: 1
  include_soldier: true
  palette_mapping: true

growth_randomization:
  character: random
  class: random

base_stat_randomization:
  character: random
  class: shuffle
  preserve_base: true
  con:
    enabled: true

item_randomization:
  enabled: true

weapon_randomization:
  enabled: true

weapon_effects:
  enabled: 10

affinity_randomization:
  enabled: true

promotion_items:
  enabled: true

loot_randomization:
  enabled: true
  mode: shuffle

enemy_randomization:
  enabled: true
  randomize_classes: true
  randomize_items: true
  include_bosses: true
  boss_buffs:
    growths:
      mode: 1.3
    base_stats:
      mode: 1.3
    max_weapon_ranks: true
